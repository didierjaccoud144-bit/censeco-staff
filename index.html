<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENSECO 2026 - STAFF V11.9 (CLOUD)</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230000FF%22/><text y=%22.85em%22 x=%2212%22 font-size=%2275%22>👤</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230000FF%22/><text y=%22.85em%22 x=%2212%22 font-size=%2275%22>👤</text></svg>">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CenSeco STAFF">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />
    
    <style>
        :root { --bg: #f1f5f9; --fids: #ffcc00; --accent: #4338ca; --success: #15803d; --danger: #dc2626; --piquet: #10b981; --std-blue: #0000FF; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; color: #fff; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--fids); }
        .nav-main { display: flex; background: #fff; border-bottom: 1px solid #cbd5e1; flex-shrink: 0; overflow-x: auto; }
        .nav-btn { padding: 15px 25px; cursor: pointer; border: none; background: none; font-weight: bold; opacity: 0.5; font-size: 0.9em; white-space: nowrap; }
        .nav-btn.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }
        .container { flex: 1; overflow-y: auto; padding: 20px; position: relative; }
        .page { display: none; } .page.active { display: block; }
        .card { background: #e2e8f0; padding: 18px; border-radius: 12px; border: 1px solid #cbd5e1; margin-bottom: 20px; }
        .row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 0.65em; font-weight: 900; color: #475569; text-transform: uppercase; }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 800; background: #fff; }
        .vis-container { background: #0f172a !important; border-radius: 10px; border: 2px solid #334155; height: 600px; }
        .vis-label { color: var(--fids) !important; font-weight: bold; background: #1e293b !important; border-bottom: 1px solid #334155 !important; }
        .vis-time-axis .vis-text { color: var(--fids) !important; font-weight: bold; }
        .vis-item { border-radius: 4px !important; border-width: 0 0 0 6px !important; font-weight: 800; color: white !important; }
        .vis-item.vis-range { background-color: var(--std-blue) !important; border-color: #000099 !important; }
        .vis-item.piquet-style { background-color: var(--piquet) !important; border-color: #065f46 !important; }
        .vis-item.vis-background.alerte-vide { background-color: rgba(220, 38, 38, 0.15) !important; z-index: 1; border: none !important; }
        .floating-nav { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn-float { background: #1e293b; color: var(--fids); border: 2px solid #fff; padding: 12px 20px; border-radius: 30px; font-weight: 900; cursor: pointer; font-size: 0.75em; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-v { background: var(--success); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .footer { text-align: center; padding: 10px; font-size: 0.7em; opacity: 0.5; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900;">CENSECO 2026 - STAFF (V11.9 CLOUD)</div>
    <div id="clock">00:00:00</div>
</header>

<div class="nav-main">
    <button class="nav-btn active" onclick="showPage('registre', event)">👤 REGISTRE</button>
    <button class="nav-btn" onclick="showPage('planning', event)">🗓️ PLANNING (LIVE)</button>
</div>

<div class="container">
    <div id="registre" class="page active">
        <div class="card">
            <div class="row">
                <div class="field"><label>Grade</label><input type="text" id="pGrade" style="width:70px;"></div>
                <div class="field" style="flex:1;"><label>Nom</label><input type="text" id="pIdentite"></div>
                <div class="field">
                    <label>Poste</label>
                    <select id="pFonction">
                        <option value="C CenSeco">C CenSeco</option><option value="Adj C CenSeco">Adj C CenSeco</option>
                        <option value="AIC C CenSeco">AIC C CenSeco</option><option value="AIC Régulateur">AIC Régulateur</option>
                        <option value="Régulateur">Régulateur</option><option value="Dispatch hélico">Dispatch hélico</option><option value="Guide">Guide</option>
                    </select>
                </div>
                <button class="btn-v" onclick="addStaff()">+ ENREGISTRER</button>
            </div>
        </div>
        <div id="staffList"></div>
    </div>

    <div id="planning" class="page">
        <div class="card" style="background:#fff;">
            <div class="row">
                <div class="field"><label>Membre</label><select id="sel-staff" style="width:200px;"></select></div>
                <div class="field">
                    <label>Poste</label>
                    <select id="sel-poste">
                        <option value="C">C CenSeco</option><option value="ADJ">Adj C CenSeco</option>
                        <option value="AIC_C">AIC C CenSeco</option><option value="AIC_R1">AIC Régulateur 1</option>
                        <option value="AIC_R2">AIC Régulateur 2</option><option value="R1">Régulateur 1</option>
                        <option value="R2">Régulateur 2</option><option value="HELI">Dispatch hélico</option>
                        <option value="GUIDE">Guide</option><option value="PIQUET">🚩 PIQUET</option>
                    </select>
                </div>
                <div class="field"><label>Début</label><input type="datetime-local" id="gStart"></div>
                <div class="field"><label>Fin</label><input type="datetime-local" id="gEnd"></div>
                <button class="btn-v" onclick="assignGarde()">➕ AFFECTER</button>
            </div>
        </div>
        <div id="vis-staff" class="vis-container"></div>
        <div class="floating-nav">
            <button class="btn-float" style="background:var(--danger); color:white;" onclick="jumpTo(0)">🎯 MAINTENANT</button>
            <button class="btn-float" onclick="jumpTo(12)">🕒 H +12h</button>
            <button class="btn-float" onclick="jumpTo(24)">🕒 H +24h</button>
        </div>
    </div>
</div>

<div class="footer">Une création DJA’WEB avec l’aide de Gemini IA</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU",
        authDomain: "censeco-2026.firebaseapp.com",
        databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "censeco-2026",
        storageBucket: "censeco-2026.firebasestorage.app",
        messagingSenderId: "1030152312862",
        appId: "1:1030152312862:web:9618132ec2bcfc7831b60f"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('planning_staff');

    let personnel = JSON.parse(localStorage.getItem('db_staff_v11.9')) || [];
    let gardes = [];
    let timelineStaff;
    const itemsStaff = new vis.DataSet([]);
    const groupsStaff = new vis.DataSet([
        { id: 'C', content: 'C CenSeco' }, { id: 'ADJ', content: 'Adj C CenSeco' },
        { id: 'AIC_C', content: 'AIC C CenSeco' }, { id: 'AIC_R1', content: 'AIC Régulateur 1' },
        { id: 'AIC_R2', content: 'AIC Régulateur 2' }, { id: 'R1', content: 'Régulateur 1' },
        { id: 'R2', content: 'Régulateur 2' }, { id: 'HELI', content: 'Dispatch hélico' },
        { id: 'GUIDE', content: 'Guide' }, { id: 'PIQUET', content: '🚩 PIQUET', stack: true }
    ]);

    window.onload = () => {
        initTimeline();
        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                personnel = data.personnel || [];
                gardes = data.gardes || [];
                renderStaffList();
                itemsStaff.clear();
                addBackgrounds();
                const cloudItems = gardes.map(g => ({ ...g, start: new Date(g.start), end: new Date(g.end) }));
                itemsStaff.add(cloudItems);
            }
        });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
        setCurrentTimes();
    };

    function addStaff() {
        const iden = document.getElementById('pIdentite').value;
        if(!iden) return;
        personnel.push({ id: Date.now(), grade: document.getElementById('pGrade').value.toUpperCase(), identite: iden, fonction: document.getElementById('pFonction').value });
        updateCloud();
        document.getElementById('pIdentite').value = '';
    }

    function assignGarde() {
        const sId = document.getElementById('sel-staff').value;
        const staff = personnel.find(x => x.id == sId);
        const poste = document.getElementById('sel-poste').value;
        const start = document.getElementById('gStart').value;
        const end = document.getElementById('gEnd').value;
        if(!staff || !start || !end) return alert("Champs vides.");
        const entry = { id: 'g_' + Date.now(), group: poste, start: new Date(start), end: new Date(end), content: "[" + staff.grade + "] " + staff.identite, className: poste === 'PIQUET' ? 'piquet-style' : '' };
        itemsStaff.add(entry);
        syncGardes();
    }

    function syncGardes() {
        gardes = itemsStaff.get({ filter: i => i.type !== 'background' }).map(i => ({
            ...i, start: i.start.toISOString(), end: i.end.toISOString()
        }));
        updateCloud();
    }

    function updateCloud() {
        localStorage.setItem('db_staff_v11.9', JSON.stringify(personnel));
        dbRef.set({ personnel: personnel, gardes: gardes });
        renderStaffList();
    }

    function renderStaffList() {
        const list = document.getElementById('staffList'); const sel = document.getElementById('sel-staff');
        list.innerHTML = ''; sel.innerHTML = '';
        personnel.forEach(m => {
            list.innerHTML += `<div style="background:#fff; padding:10px; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between; border:1px solid #cbd5e1;"><span><b>[${m.grade}]</b> ${m.identite}</span><button onclick="delStaff(${m.id})" style="color:red; border:none; background:none; cursor:pointer;">🗑️</button></div>`;
            sel.add(new Option("[" + m.grade + "] " + m.identite, m.id));
        });
    }

    function delStaff(id) { if(confirm("Supprimer ce membre ?")) { personnel = personnel.filter(x => x.id !== id); updateCloud(); } }

    function initTimeline() {
        timelineStaff = new vis.Timeline(document.getElementById('vis-staff'), itemsStaff, groupsStaff, {
            stack: true, editable: true, showCurrentTime: true,
            snap: (date) => Math.round(date / (15 * 60 * 1000)) * (15 * 60 * 1000)
        });
        timelineStaff.on('itemchanged', syncGardes);
        timelineStaff.on('itemremoved', syncGardes);
    }

    function addBackgrounds() {
        const t = new Date().setHours(0,0,0,0);
        groupsStaff.get().filter(g => g.id !== 'PIQUET').forEach(g => {
            itemsStaff.add({ id: 'bg_'+g.id, group: g.id, start: t, end: t + (72*3600000), type: 'background', className: 'alerte-vide' });
        });
    }

    function jumpTo(h) {
        if(!timelineStaff) return;
        const target = new Date().getTime() + (h * 3600000);
        timelineStaff.setWindow(new Date(target - 7200000), new Date(target + 28800000));
    }

    function showPage(id, e) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        if(id === 'planning') setTimeout(() => timelineStaff.redraw(), 100);
    }

    function setCurrentTimes() {
        const n = new Date(); n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
        document.getElementById('gStart').value = n.toISOString().slice(0, 16);
        document.getElementById('gEnd').value = new Date(n.getTime() + 7200000).toISOString().slice(0, 16);
    }
</script>
</body>
</html>
