<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENSECO 2026 - MONITOR V5.9</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #020617; --fids: #ffcc00; --accent: #38bdf8; --on: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        header { border-bottom: 3px solid var(--fids); padding-bottom: 15px; text-align: center; }
        .clock { font-family: monospace; font-size: 2.5em; font-weight: 900; color: var(--fids); }
        .grid-staff { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; margin-top: 20px; }
        .staff-card { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid var(--accent); position: relative; }
        .name { font-size: 1.1em; font-weight: 900; color: white; display: block; }
        .role { font-size: 0.7em; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .debug-tag { font-size: 0.6em; opacity: 0.5; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; }
    </style>
</head>
<body>

<header>
    <div class="clock" id="clock">00:00:00</div>
    <div id="status" style="font-size: 0.8em; color: var(--accent); margin-top: 10px;">Initialisation du scan profond...</div>
</header>

<div class="grid-staff" id="monitorBody"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU", authDomain: "censeco-2026.firebaseapp.com", databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app", projectId: "censeco-2026", storageBucket: "censeco-2026.firebasestorage.app", messagingSenderId: "1030152312862", appId: "1:1030152312862:web:9618132ec2bcfc7831b60f" };
    firebase.initializeApp(firebaseConfig);
    
    const branches = ['censeco-staff', 'planning_pdg', 'planning_staff', 'tasks'];
    let foundItems = [];

    function update() {
        foundItems = [];
        branches.forEach(path => {
            firebase.database().ref(path).once('value', snap => {
                const data = snap.val();
                if (data) {
                    scan(data, path);
                    render();
                }
            });
        });
    }

    function scan(obj, source) {
        if (!obj || typeof obj !== 'object') return;
        
        // On cherche le nom (text ou personName)
        const name = obj.text || obj.personName || obj.label;
        if (name && typeof name === 'string' && name.length > 2 && !name.includes("[CIV]")) {
            foundItems.push({
                name: name.toUpperCase(),
                role: (obj.rowId || 'MEMBRE').replace(/_/g, ' '),
                date: obj.start_date || obj.start || '?',
                src: source
            });
        } else {
            Object.values(obj).forEach(v => scan(v, source));
        }
    }

    function render() {
        const body = document.getElementById('monitorBody');
        document.getElementById('status').innerText = foundItems.length + " éléments trouvés dans la base.";

        if (foundItems.length === 0) {
            body.innerHTML = '<div style="grid-column:1/-1; text-align:center; opacity:0.4;">Aucune donnée trouvée. Vérifiez la branche de votre Master.</div>';
            return;
        }

        // Tri par nom pour y voir clair
        foundItems.sort((a, b) => a.name.localeCompare(b.name));

        body.innerHTML = foundItems.map(d => `
            <div class="staff-card">
                <span class="role">${d.role}</span>
                <span class="name">${d.name}</span>
                <div class="debug-tag">Source: ${d.src}<br>Date: ${d.date}</div>
            </div>
        `).join('');
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    update();
    setInterval(update, 15000); // Scan toutes les 15s
</script>
</body>
</html>
