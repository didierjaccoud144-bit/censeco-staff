<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENSECO 2026 - PLANNING DIAGNOSTIC</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #020617; --fids: #ffcc00; --accent: #38bdf8; --on: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        header { border-bottom: 3px solid var(--fids); padding-bottom: 10px; text-align: center; }
        .clock { font-family: monospace; font-size: 2em; font-weight: 900; color: var(--fids); }
        
        .debug-panel { 
            background: #000; color: #0f0; font-family: monospace; 
            padding: 15px; border: 1px solid #0f0; border-radius: 8px;
            margin: 20px 0; font-size: 0.8em; max-height: 200px; overflow-y: auto;
        }

        .grid-staff { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
        .staff-card { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid var(--accent); position: relative; }
        .name { font-size: 1.2em; font-weight: 900; color: white; display: block; }
        .role { font-size: 0.7em; font-weight: 900; color: var(--accent); text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div class="clock" id="clock">00:00:00</div>
    <div style="font-size: 0.8em; margin-top: 5px; color:var(--accent);">ANALYSE DE STRUCTURE EN COURS...</div>
</header>

<div id="debugInfo" class="debug-panel">Recherche des clés de la base de données...</div>

<div id="monitorBody" class="grid-staff"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU", authDomain: "censeco-2026.firebaseapp.com", databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app", projectId: "censeco-2026", storageBucket: "censeco-2026.firebasestorage.app", messagingSenderId: "1030152312862", appId: "1:1030152312862:web:9618132ec2bcfc7831b60f" };
    firebase.initializeApp(firebaseConfig);
    
    const dbRef = firebase.database().ref(); 

    dbRef.on('value', snap => {
        const root = snap.val();
        const debugDiv = document.getElementById('debugInfo');
        
        if (!root) {
            debugDiv.innerText = "ERREUR : La base est totalement vide ou l'accès est refusé.";
            return;
        }

        // AFFICHE LES CLÉS TROUVÉES POUR NOUS AIDER
        const keys = Object.keys(root);
        debugDiv.innerText = "CLÉS TROUVÉES À LA RACINE : " + keys.join(' | ') + "\n\n";

        let foundTasks = [];

        // SCANNER RECURSIF
        function scan(obj, path = "") {
            if (!obj || typeof obj !== 'object') return;
            
            // Si on trouve un objet qui ressemble à une tâche Gantt (caractéristiques de ton image 3)
            if ((obj.text || obj.personName) && (obj.start_date || obj.start)) {
                foundTasks.push(obj);
            } else {
                for (let key in obj) {
                    scan(obj[key], path + "/" + key);
                }
            }
        }

        scan(root);
        debugDiv.innerText += "ÉLÉMENTS DÉTECTÉS : " + foundTasks.length;
        
        render(foundTasks);
    });

    function render(tasks) {
        const body = document.getElementById('monitorBody');
        if (tasks.length === 0) {
            body.innerHTML = '<div style="grid-column:1/-1; text-align:center; opacity:0.5;">Aucun membre détecté. Regardez le panneau vert ci-dessus.</div>';
            return;
        }

        body.innerHTML = tasks.map(t => `
            <div class="staff-card">
                <span class="role">${(t.rowId || 'STAFF').replace(/_/g, ' ')}</span>
                <span class="name">${(t.text || t.personName || 'INCONNU').toUpperCase()}</span>
                <span style="font-size:0.8em; color:var(--fids);">${t.start_date || t.start || ''}</span>
            </div>
        `).join('');
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
</script>
</body>
</html>
