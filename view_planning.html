<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENSECO 2026 - DEBUG PLANNING</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #020617; --fids: #ffcc00; --accent: #38bdf8; --on: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        header { border-bottom: 3px solid var(--fids); padding-bottom: 10px; text-align: center; }
        .clock { font-family: monospace; font-size: 2em; font-weight: 900; color: var(--fids); }
        .grid-staff { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .staff-card { background: #1e293b; border-radius: 12px; padding: 15px; border: 1px solid var(--accent); }
        .role { font-size: 0.7em; font-weight: 900; color: var(--accent); display: block; }
        .name { font-size: 1.2em; font-weight: 900; color: white; display: block; }
        .time { font-size: 0.8em; color: var(--fids); margin-top: 5px; display: block; }
        .debug-info { font-size: 0.6em; opacity: 0.5; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; }
    </style>
</head>
<body>

<header>
    <div class="clock" id="clock">00:00:00</div>
    <div id="status" style="font-size: 0.8em; margin-top: 5px;">Connexion Firebase...</div>
</header>

<div id="monitorBody" class="grid-staff"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU", authDomain: "censeco-2026.firebaseapp.com", databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app", projectId: "censeco-2026", storageBucket: "censeco-2026.firebasestorage.app", messagingSenderId: "1030152312862", appId: "1:1030152312862:web:9618132ec2bcfc7831b60f" };
    firebase.initializeApp(firebaseConfig);
    
    // On écoute TOUTE la base pour ne rien rater
    const dbRef = firebase.database().ref(); 

    dbRef.on('value', snap => {
        const root = snap.val();
        console.log("Données reçues :", root);
        document.getElementById('status').innerText = root ? "Données reçues, analyse en cours..." : "Base vide ou erreur de connexion";
        
        let foundTasks = [];

        function scan(obj) {
            if (!obj || typeof obj !== 'object') return;
            // On cherche n'importe quel objet qui a un nom et une date
            if ((obj.text || obj.personName || obj.label) && (obj.start_date || obj.start)) {
                foundTasks.push(obj);
            } else {
                Object.values(obj).forEach(v => scan(v));
            }
        }

        scan(root);
        render(foundTasks);
    });

    function render(tasks) {
        const body = document.getElementById('monitorBody');
        document.getElementById('status').innerText = tasks.length + " élément(s) trouvé(s) dans la base";

        if (tasks.length === 0) {
            body.innerHTML = '<div style="grid-column:1/-1; text-align:center; opacity:0.5;">Aucune tâche de planning détectée. Vérifiez le nom de la branche Firebase.</div>';
            return;
        }

        body.innerHTML = tasks.map(t => {
            const n = t.personName || t.text || t.label || "Inconnu";
            const r = t.rowId || "Staff";
            const s = t.start_date || t.start || "--:--";
            const e = t.end_date || t.end || "--:--";
            
            return `
                <div class="staff-card">
                    <span class="role">${r.replace(/_/g, ' ')}</span>
                    <span class="name">${n.toUpperCase()}</span>
                    <span class="time">${s.split(' ')[1] || s} - ${e.split(' ')[1] || e}</span>
                    <div class="debug-info">Date brute: ${s.split(' ')[0]}</div>
                </div>
            `;
        }).join('');
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
</script>
</body>
</html>
