<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENSECO 2026 - PLANNING MONITOR V4.1</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #020617; --fids: #ffcc00; --accent: #38bdf8; --on: #22c55e; --off: #64748b; --next: #a855f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; box-sizing: border-box; }
        header { border-bottom: 3px solid var(--fids); padding-bottom: 15px; margin-bottom: 20px; text-align: center; }
        .clock { font-family: monospace; font-size: 2.5em; font-weight: 900; color: var(--fids); line-height: 1; }
        .current-date { font-size: 1.1em; opacity: 0.8; margin-top: 8px; font-weight: 600; }
        h2 { text-transform: uppercase; font-size: 0.9em; letter-spacing: 2px; color: var(--accent); border-left: 5px solid var(--accent); padding-left: 12px; margin: 30px 0 15px 0; }
        .grid-staff { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
        .staff-card { background: #1e293b; border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .status-dot { position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; border-radius: 50%; background: var(--off); }
        .active .status-dot { background: var(--on); box-shadow: 0 0 8px var(--on); }
        .upcoming .status-dot { background: var(--next); box-shadow: 0 0 8px var(--next); }
        .role { font-size: 0.65em; font-weight: 900; text-transform: uppercase; color: var(--accent); display: block; margin-bottom: 3px; }
        .name { font-size: 1.1em; font-weight: 900; color: white; }
        .time-range { font-size: 0.8em; font-weight: 800; color: var(--fids); margin-top: 8px; display: block; }
        .empty-msg { opacity: 0.2; font-style: italic; font-size: 0.8em; padding: 10px; }
    </style>
</head>
<body>

<header>
    <div class="clock" id="clock">00:00:00</div>
    <div id="fullDate" class="current-date">Chargement...</div>
</header>

<section>
    <h2>🟢 EN POSTE (AUJOURD'HUI)</h2>
    <div class="grid-staff" id="staffOn"></div>
</section>

<section>
    <h2 style="color:var(--next); border-color:var(--next);">⏳ PROCHAINS TOURNUS (-4H)</h2>
    <div class="grid-staff" id="staffNext"></div>
</section>

<section>
    <h2 style="color:#94a3b8; border-color:#475569;">⚪ REPOS / CONGÉS</h2>
    <div class="grid-staff" id="staffOff"></div>
</section>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA7zWuD_8yzhWARz-lSdHmDrcr7M9kHFHU", authDomain: "censeco-2026.firebaseapp.com", databaseURL: "https://censeco-2026-default-rtdb.europe-west1.firebasedatabase.app", projectId: "censeco-2026", storageBucket: "censeco-2026.firebasestorage.app", messagingSenderId: "1030152312862", appId: "1:1030152312862:web:9618132ec2bcfc7831b60f" };
    firebase.initializeApp(firebaseConfig);
    
    // On pointe sur la racine pour être sûr de tout voir
    const dbRef = firebase.database().ref(); 

    dbRef.on('value', snap => {
        const root = snap.val();
        let tasks = [];

        // Extraction robuste des tâches (on cherche partout où il y a des "tasks")
        if (root.planning_data && root.planning_data.tasks) {
            tasks = Object.values(root.planning_data.tasks);
        } else if (root.tasks) {
            tasks = Object.values(root.tasks);
        }

        renderView(tasks);
    });

    function renderView(tasks) {
        const onCont = document.getElementById('staffOn');
        const nextCont = document.getElementById('staffNext');
        const offCont = document.getElementById('staffOff');
        
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0]; // Format "2026-03-24"
        const nowVal = now.getHours() + (now.getMinutes() / 60);

        let listOn = []; let listNext = []; let listOff = [];

        tasks.forEach(t => {
            // On vérifie les champs : personName ou text (selon ta version)
            const pName = t.personName || t.text;
            if (!pName || !t.start_date) return;

            // Gestion de la date de la tâche
            const tDate = t.start_date.split(' ')[0]; // Récupère la partie date "YYYY-MM-DD"
            
            // On ne traite que les tâches d'AUJOURD'HUI
            if (tDate === todayStr) {
                // Heures de début/fin (souvent en format "YYYY-MM-DD HH:mm")
                const startTime = t.start_date.split(' ')[1];
                const endTime = t.end_date ? t.end_date.split(' ')[1] : "";
                
                const sH = parseFloat(startTime.split(':')[0]) + (parseFloat(startTime.split(':')[1])/60);
                const eH = endTime ? parseFloat(endTime.split(':')[0]) + (parseFloat(endTime.split(':')[1])/60) : sH + 8;

                const card = {
                    name: pName.toUpperCase(),
                    role: (t.rowId || 'STAFF').replace(/_/g, ' '),
                    time: `${startTime} - ${endTime || '?'}`
                };

                if (t.rowId === 'CONGÉS' || t.rowId === 'CONGÉ') {
                    listOff.push(card);
                } else if (nowVal >= sH && nowVal < eH) {
                    listOn.push(card);
                } else if (sH > nowVal && sH < nowVal + 4) {
                    listNext.push(card);
                }
            }
        });

        const html = (d, cl) => `<div class="staff-card ${cl}"><div class="status-dot"></div><span class="role">${d.role}</span><span class="name">${d.name}</span><span class="time-range">${d.time}</span></div>`;

        onCont.innerHTML = listOn.length ? listOn.map(d => html(d, 'active')).join('') : '<div class="empty-msg">Personne en poste.</div>';
        nextCont.innerHTML = listNext.length ? listNext.map(d => html(d, 'upcoming')).join('') : '<div class="empty-msg">Aucun tournus proche.</div>';
        offCont.innerHTML = listOff.length ? listOff.map(d => html(d, 'off')).join('') : '<div class="empty-msg">-</div>';
    }

    function updateClock() {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('fr-FR');
        document.getElementById('fullDate').innerText = `Nous sommes le ${n.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}`;
    }
    setInterval(updateClock, 1000); updateClock();
</script>
</body>
</html>
